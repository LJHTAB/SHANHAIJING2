<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山海经·异兽库</title>
    <style>
.search-container {
    position: relative;
    padding: 15px;
    background: #1a1a1a;
    border-bottom: 2px solid #333;
}

#beastSearch {
    width: 100%;
    background: #000;
    border: 2px solid #444;
    padding: 10px 10px 10px 35px;
    color: #fff;
    font-family: 'Courier New', Courier, monospace; /* 像素/代码字体 */
    outline: none;
    transition: 0.3s;
}
#clearBtn {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    display: none; /* 初始隐藏 */
    z-index: 10;
    transition: color 0.2s;
}

#clearBtn:hover {
    color: #ff4757; /* 悬停时变红，符合你的“凶兽”配色 */
}

#beastSearch:focus {
    border-color: var(--color-god); /* 聚焦时亮起金边 */
    box-shadow: 0 0 10px rgba(241, 196, 15, 0.2);
}

.search-icon {
    position: absolute;
    left: 25px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
}

.main-header {
    position: absolute; /* 绝对定位 */
    top: 20px;
    left: 20px;
    z-index: 100; /* 确保在最上层 */
    pointer-events: none; /* 防止遮挡下方的点击事件 */
}

.main-header h1 {
    margin: 0;
    font-size: 32px;
    color: var(--color-god); /* 使用神兽的金黄色，非常醒目 */
    text-transform: uppercase;
    /* 核心：用多重阴影制造像素粗体厚度感 */
    text-shadow: 
        4px 4px 0px #000,
        -1px -1px 0px #000,  
         1px -1px 0px #000,
        -1px  1px 0px #000,
         1px  1px 0px #000;
    letter-spacing: 4px;
}

.main-header .sub-line {
    font-size: 12px;
    color: #888;
    margin-top: 5px;
    text-shadow: 2px 2px 0px #000;
}

/* 适配：为了不让标题挡住导航栏，给导航栏加点左边距 */
.category-nav {
    padding-left: 300px; /* 根据标题宽度调整，留出左侧空间 */
}

        :root {
            --color-god: #f1c40f;   
            --color-evil: #e74c3c;  
            --color-weird: #9b59b6; 
            --bg-dark: #121212;
        }

        /* 基础重置 */
        * { box-sizing: border-box; -webkit-font-smoothing: none; image-rendering: pixelated; }

        @font-face {
            font-family: 'ZLabsRoundPix';
            src: url('fonts/ZLabsRoundPix_16px_M_CN.woff2') format('woff2');
            font-display: swap;
        }

        body {
            margin: 0; background-color: var(--bg-dark); color: #fff;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            font-family: 'ZLabsRoundPix', monospace !important;
            letter-spacing: 2px;
        }
/* =========================================
   【新媒体设计】定制：像素兽爪光标 (PNG 图片版)
========================================= */

/* 1. 全局默认：白色厚边像素兽爪 (32x32 像素) */
body {
    /* 16 16 表示点击的热点（Hotspot）在图片的精准中心位置 */
    cursor: url('img/光标-白.png') 16 16, auto !important;
}

/* 2. 交互状态：金色厚边像素兽爪 (用于所有可点击元素) */
/* 这里强制覆盖了所有你可能用到的按钮、列表项和交互区 */
a, button, [onclick], 
.beast-item, .zoom-btn, .nav-btn, .category-nav div, 
.monitor, svg {
    cursor: url('img/光标-金.png') 16 16, pointer !important;
}

        /* 导航与侧边栏 */
        .category-nav { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #1a1a1a; border-bottom: 6px solid #000; }
        .nav-btn { padding: 12px 24px; cursor: pointer; border: 4px solid #000; font-size: 14px; box-shadow: 4px 4px 0px #000; background: #444; color: #fff; }
        .nav-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .btn-god { background: var(--color-god); color: #000; }
        .btn-evil { background: var(--color-evil); color: #fff; }
        .btn-weird { background: var(--color-weird); color: #fff; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: #1a1a1a; border-right: 6px solid #000; padding: 20px; overflow-y: auto; }
        
        .beast-item {
    background: #222; 
    margin-bottom: 15px; 
    padding: 8px; /* 减小 padding，让布局更紧凑 */
    cursor: pointer; 
    border: 4px solid #444; 
    transition: 0.1s;
    
    /* --- 新增：Flex 布局 --- */
    display: flex;
    align-items: center; /* 垂直居中 */
    gap: 12px; /* 图片和文字的间距 */
    
    /* --- 新增：悬停效果 (配合金色爪子光标) --- */
    cursor: url("data:image/svg+xml,...金色爪子...") 4 4, pointer !important;
}

/* --- 新增：缩略图样式 --- */
.beast-item .beast-icon {
    width: 48px;  /* 设定固定宽度 */
    height: 48px; /* 设定固定高度 */
    background: #000; /* 图片背景色，增加对比度 */
    border: 2px solid #666; /* 简单的像素边框 */
    
    /* 核心：确保像素图片不模糊 */
    image-rendering: pixelated; 
    object-fit: contain; /* 确保图片在框内完整显示 */
    flex-shrink: 0; /* 防止图片被压缩 */
}

/* --- 新增：文字容器样式 --- */
.beast-item .beast-info {
    flex: 1; /* 占据剩余空间 */
    display: flex;
    flex-direction: column; /* 文字垂直排列 */
}

.beast-item.active { border-color: #fff; background: #333; }

        /* 右侧布局 */
        .display-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; gap: 20px; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 16px 16px;
        }

        .monitor {
    width: 320px; 
    height: 320px; 
    background: #000;
    border: 8px solid #333; 
    display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        #mainSprite { max-width: 280px; max-height: 280px; object-fit: contain; image-rendering: pixelated; }
.monitor::after {
    content: " ";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 3px, 3px 100%;
    pointer-events: none; /* 确保不影响点击按钮 */
    z-index: 5;
}
        .desc-box { width: 90%; max-width: 600px; background: #222; color: #eee; padding: 20px; border: 4px solid #fff; flex-shrink: 0; }
        #bName { font-size: 24px; margin: 0; border-bottom: 4px solid #444; padding-bottom: 10px; }
        .type-label { display: inline-block; padding: 4px 10px; border: 2px solid #000; margin: 15px 0; font-size: 12px; color: #000; }
/* 放大镜按钮：采用厚重的像素边框风格 */
.zoom-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 36px;
    height: 36px;
    background: #333;
    border: 4px solid #000;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 2px 2px 0px #000;
    z-index: 10;
}

.zoom-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000; }
.zoom-overlay {
    display: none; /* 初始隐藏 */
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.85); /* 半透明黑色背景 */
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
}
.zoom-overlay img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    /* 核心：确保放大后像素依然锐利不模糊 */
    image-rendering: pixelated; 
    border: 6px solid #fff;
}
/* 收藏按钮样式 */
.collect-btn {
    position: absolute;
    bottom: 20px;
    right: 70px; /* 放在放大镜左边 */
    background: rgba(0,0,0,0.6);
    border: 2px solid #fff;
    padding: 8px;
    cursor: pointer;
    z-index: 10;
    transition: 0.2s;
}
.collect-btn:hover { background: #ff4757; border-color: #ff4757; }

/* 侧边栏样式 */
.side-panel {
    position: fixed;
    top: 0;
    right: -250px; /* 初始隐藏 */
    width: 250px;
    height: 100vh;
    background: #1a1a1a;
    border-left: 4px solid #444;
    transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    z-index: 100;
    box-shadow: -5px 0 15px rgba(0,0,0,0.5);
}

/* 侧边栏展开状态 */
.side-panel.open { right: 0; }

/* 展开/收起按钮（竖排文字） */
.panel-toggle {
    position: absolute;
    left: -40px;
    top: 50%;
    transform: translateY(-50%);
    background: #444;
    color: #fff;
    padding: 15px 10px;
    cursor: pointer;
    border-radius: 8px 0 0 8px;
    writing-mode: vertical-lr;
    font-size: 12px;
}

.panel-content {
    padding: 20px;
    height: 100%;
    overflow-y: auto;
}

/* 收藏项的样式（像素风小卡片） */
.collect-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #222;
    padding: 10px;
    margin-top: 10px;
    border: 2px solid #333;
}
.collect-item img {
    width: 40px;
    height: 40px;
    image-rendering: pixelated;
}

    </style>
</head>

let favorites = [];
function typeWriter(text, element) {
    element.innerText = ''; 
    let i = 0;
    const speed = 30; 

    if (element.typeTimer) clearInterval(element.typeTimer);

    element.typeTimer = setInterval(() => {
        if (i < text.length) {
            element.innerText += text.charAt(i);
            i++;
        } else {
            clearInterval(element.typeTimer);
        }
    }, speed);
}

function renderList(filter) {
    const listContainer = document.getElementById('beastList');
    listContainer.innerHTML = '';
    
    const filtered = filter === '全部' ? beastData : beastData.filter(b =>b.type === filter);
    
    filtered.forEach(beast => {
        const item = document.createElement('div');
        item.className = 'beast-item';
        
        const iconSrc = beast.icon || 'img/default_icon.png';
        
        item.innerHTML = `
            <img src="${iconSrc}" alt="${beast.name}" class="beast-icon">
            <div class="beast-info">
                <div style="font-size:10px; color:${beast.color}; margin-bottom:3px;">[ ${beast.type} ]</div>
                <div style="font-size:14px; color:#fff;">${beast.name}</div>
            </div>
        `;
        
        item.onclick = () => updateDisplay(beast, item);
        listContainer.appendChild(item);
    });
    
    if(filtered.length > 0) updateDisplay(filtered[0], listContainer.firstChild);
}


       function updateDisplay(data, element) {
        window.currentBeast = data; // 必须保留这行，否则切换功能会失效
        const nameEl = document.getElementById('bName');
        nameEl.innerText = data.name;
        nameEl.style.color = data.color;
        
        typeWriter(data.desc, document.getElementById('bDesc'));
        document.getElementById('mainSprite').src = data.img;
        document.getElementById('monitorFrame').style.borderColor = data.color;
        
        const tag = document.getElementById('bTypeTag');
        tag.innerText = data.type;
        tag.style.backgroundColor = data.color;

        document.querySelectorAll('.beast-item').forEach(i => i.classList.remove('active'));
        if(element) element.classList.add('active');
    }

    // 新增：切换图纸逻辑
    function togglePattern() {
        const imgElement = document.getElementById('mainSprite');
        const beast = window.currentBeast; 
        if (!beast) return;

        // 如果当前是图纸，切回立绘；如果是立绘，切到图纸
        if (imgElement.src.includes(beast.pattern)) {
            imgElement.src = beast.img;
        } else if (beast.pattern) {
            imgElement.src = beast.pattern;
        } else {
            alert("该异兽暂无图纸数据！");
        }
    }

    // 新增：随机召唤逻辑
    function randomSummon() {
        const randomIndex = Math.floor(Math.random() * beastData.length);
        updateDisplay(beastData[randomIndex], null);
    }

    function randomSummon() {
        const randomIndex = Math.floor(Math.random() * beastData.length);
        const randomBeast = beastData[randomIndex];
        // 找到对应的 DOM 元素（如果需要高亮，可以进一步优化）
        updateDisplay(randomBeast, null);
    }

    function showPattern() {
        if(window.currentBeast && window.currentBeast.pattern) {
            document.getElementById('mainSprite').src = window.currentBeast.pattern;
        } else {
            alert("该异兽暂无图纸数据！");
        }
    }
function downloadPattern() {
    const beast = window.currentBeast;
    if (!beast || !beast.pattern) {
        alert("暂无图纸可供下载！");
        return;
    }

    // 创建一个临时的隐藏链接
    const link = document.createElement('a');
    link.href = beast.pattern;
    link.download = `${beast.name}_图纸.png`; // 设置下载文件的名字
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link); // 下载完成后移除临时元素
}
function togglePattern() {
    const imgElement = document.getElementById('mainSprite'); // 找到那个显示图片的框
    const beast = window.currentBeast; // 获取当前正在显示的异兽信息
    
    if (!beast) return;

    // 如果当前的图片地址包含图纸路径，说明现在展示的是图纸，那就切换回立绘
    // 否则，说明现在展示的是立绘，那就切换到图纸
    if (imgElement.src.includes(beast.pattern)) {
        imgElement.src = beast.img; // 切换回立绘
    } else {
        imgElement.src = beast.pattern; // 切换到图纸
    }
}
// 切换放大状态函数
function toggleZoom() {
    const overlay = document.getElementById('zoomOverlay');
    const zoomedImg = document.getElementById('zoomedImage');
    const mainImg = document.getElementById('mainSprite');

    if (overlay.style.display === 'flex') {
        overlay.style.display = 'none';
    } else {
        // 自动获取当前 monitor 里显示的图片（立绘或图纸）
        zoomedImg.src=mainImg.src;
        overlay.style.display = 'flex';
    }
}

// --- 搜索功能函数：建议放在脚本末尾 ---
function clearSearch() {
    const input = document.getElementById('beastSearch');
    const clearBtn = document.getElementById('clearBtn');
    
    input.value = "";       // 清空输入框内容
    clearBtn.style.display = "none"; // 隐藏清除按钮
    
    handleSearch();         // 重要：调用一次搜索函数，让列表恢复完整显示
    input.focus();          // 重新聚焦，方便用户继续输入
}
function handleSearch() {
    // 1. 获取用户在输入框里输入的文字
    const query = document.getElementById('beastSearch').value.toLowerCase();
     clearBtn.style.display = query.length > 0 ? "block" : "none";
    // 2. 抓取左侧列表里所有的异兽条目
    // 注意：这里的 '.beast-item' 必须和你生成列表时的类名一致
    const items = document.querySelectorAll('.beast-item');

    items.forEach(item => {
        // 3. 获取当前条目内的文字
        const text = item.innerText.toLowerCase();
        
        // 4. 逻辑判断：如果名字里包含搜索词，就显示，否则隐藏
        if (text.includes(query)) {
            item.style.display = "flex"; // 匹配成功，显示
        } else {
            item.style.display = "none"; // 匹配失败，隐藏
        }
    });
}
